<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>

    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <script src="script.js"></script>
    
    <div class="container">
<div class="calculadora">
    <div class="calculadora_display">0</div>
    <div class="calculadora_buttons">
        <button class="operator" data-action ="add">+</button>
        <button class="operator" data-action ="sub">-</button>
        <button class="operator" data-action ="mul">x</button>
        <button class="operator" data-action ="divi">:</button>
        <button class="operator" data-action ="elev">^</button>
        <button class="operator" data-action ="raiz">√</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>0</button>
        <button data-action="decimal">.</button>
        <button data-action="limpar">C</button>
        <button class="button_equal" data-action="calcular">=</button>
    </div>
</div>
</div>
</body>
</html>
